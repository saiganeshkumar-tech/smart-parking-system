<!DOCTYPE html>
<html>

<head>

<title>SGK Smart Parking</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<h1>SGK Smart Parking</h1>

<div class="card">

<h3>Select Parking Type</h3>

<select id="type" onchange="loadPlaces()">
<option value="restaurant">Restaurant Parking</option>
<option value="movie">Movie Theatre Parking</option>
</select>

<select id="placeSelect" onchange="showImage()"></select>

<img id="preview">

<h3>Mobile Number</h3>

<input id="mobile">

<button onclick="sendOTP()">Send OTP</button>

<p id="otpDisplay"></p>

<input id="otp" placeholder="Enter OTP">

<button onclick="verifyOTP()">Verify OTP</button>

<h3>Vehicle Type</h3>

<select id="vehicleType">
<option>Two Wheeler</option>
<option>Four Wheeler</option>
</select>

<h3>Vehicle Number</h3>

<input id="vehicleNumber">

<div class="counter">

<h3>Parking Status</h3>

<p>Total Slots: <span id="totalSlots">6</span></p>
<p>Booked Slots: <span id="bookedSlots">0</span></p>
<p>Available Slots: <span id="availableSlots">6</span></p>

</div>

<h3>Select Slot</h3>

<div class="grid">

<button class="slot" data="A1">A1</button>
<button class="slot" data="A2">A2</button>
<button class="slot" data="A3">A3</button>

<button class="slot" data="B1">B1</button>
<button class="slot" data="B2">B2</button>
<button class="slot" data="B3">B3</button>

</div>

<button onclick="makePayment()">Make Payment</button>

</div>

<div id="paymentAnimation">Processing Payment...</div>

<div id="ticket">

<h2>Booking Ticket</h2>

<p id="summary"></p>

<div id="qrcode"></div>

<p id="timer"></p>

</div>

<script src="script.js"></script>

</body>
</html>
