<!DOCTYPE html>
<html>

<head>

<title>Smart Parking Online Reservation</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<div class="container">

<h1>🚗 Smart Parking Online Reservation</h1>

<div class="card">

<h2 class="title">Select Restaurant / Theatre</h2>

<select id="type" onchange="loadPlaces()">
<option value="restaurant">Restaurant Parking</option>
<option value="movie">Movie Theatre Parking</option>
</select>

<select id="placeSelect"></select>

<h2 class="title">Available Parking Slots</h2>

<div class="grid">

<button class="slot" data="A1">A1</button>
<button class="slot" data="A2">A2</button>
<button class="slot" data="A3">A3</button>

<button class="slot" data="B1">B1</button>
<button class="slot" data="B2">B2</button>
<button class="slot" data="B3">B3</button>

</div>

<h2 class="title">Parking Time</h2>

<select id="timeSlot">
<option>30 Minutes</option>
<option>1 Hour</option>
<option>2 Hours</option>
<option>3 Hours</option>
</select>

<input id="name" placeholder="Enter Name">

<input id="mobile" placeholder="Enter Mobile Number">

<button onclick="sendOTP()">Send OTP</button>

<p id="otpDisplay"></p>

<input id="otp" placeholder="Enter OTP">

<button onclick="verifyOTP()">Verify OTP</button>

<select id="vehicleType">
<option>Two Wheeler</option>
<option>Four Wheeler</option>
</select>

<input id="vehicleNumber" placeholder="Vehicle Number">

<button class="reserve" onclick="makePayment()">Reserve Parking Slot</button>

</div>

</div>

<div id="paymentAnimation">

Processing Payment...

</div>

<div id="popup">

<div class="ticket">

<h2>🎟 Parking Ticket</h2>

<hr>

<div id="summary"></div>

<hr>

<div class="qrContainer">
<div id="qrcode"></div>
</div>

<button onclick="closePopup()">Close</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
