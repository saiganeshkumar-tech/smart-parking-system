<!DOCTYPE html>
<html>

<head>

<title>Smart Parking Online Reservation</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<div class="card">

<h1>🚗 Smart Parking Online Reservation</h1>

<h2>Select Parking Type</h2>

<select id="type" onchange="loadPlaces()">
<option value="restaurant">Restaurant Parking</option>
<option value="theatre">Theatre Parking</option>
</select>

<select id="place"></select>

<h2>Available Parking Slots</h2>

<div class="slots">

<button class="slot" onclick="selectSlot(this)">A1</button>
<button class="slot" onclick="selectSlot(this)">A2</button>
<button class="slot" onclick="selectSlot(this)">A3</button>

<button class="slot" onclick="selectSlot(this)">B1</button>
<button class="slot" onclick="selectSlot(this)">B2</button>
<button class="slot" onclick="selectSlot(this)">B3</button>

</div>

<input id="name" placeholder="Enter Name">

<input id="mobile" placeholder="Enter Mobile Number">

<button onclick="sendOTP()">Send OTP</button>

<p id="otpText"></p>

<input id="otp" placeholder="Enter OTP">

<button onclick="verifyOTP()">Verify OTP</button>

<select id="vehicleType">
<option>Two Wheeler</option>
<option>Four Wheeler</option>
</select>

<input id="vehicleNumber" placeholder="Vehicle Number">

<h2>Select Time Slot</h2>

<select id="timeSlot">

<option value="">Select Time</option>

<option>09:00 AM - 10:00 AM</option>
<option>10:00 AM - 11:00 AM</option>
<option>11:00 AM - 12:00 PM</option>
<option>12:00 PM - 01:00 PM</option>
<option>01:00 PM - 02:00 PM</option>
<option>02:00 PM - 03:00 PM</option>
<option>03:00 PM - 04:00 PM</option>
<option>04:00 PM - 05:00 PM</option>
<option>05:00 PM - 06:00 PM</option>

</select>

<button class="payBtn" onclick="bookParking()">Make Payment</button>

</div>


<div id="popup">

<div class="ticket">

<h2>Parking Ticket</h2>

<hr>

<div id="ticketDetails"></div>

<hr>

<div id="qrcode"></div>

<button onclick="closeTicket()">Close</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
